name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-import-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests cryptography ruff
      - name: Ruff (style)
        run: ruff check modules/ scripts/ || true
      - name: Import check
        run: |
          python -c "import sys; sys.path.insert(0, 'modules/llm-history'); import providers.chatgpt, providers.claude, providers.perplexity, providers.copilot, providers.gemini"
          python -c "import sys; sys.path.insert(0, 'scripts'); import credentials"
